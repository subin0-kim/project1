name: 🚀 Feature
description: 개발할 기능을 작성합니다
title: "[Feature] "
labels: ["feature"]

body:
  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능인지 간단히 설명해주세요
      placeholder: 예) 사용자 프로필 수정 기능 추가
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 필요한 이유
      description: 왜 이 기능이 필요한가요?
      placeholder: 예) 사용자가 개인정보를 수정할 수 있어야 합니다
    validations:
      required: true